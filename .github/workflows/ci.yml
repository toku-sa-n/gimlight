name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  hlint:
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2.0.0

      - name: Run hlint
        uses: haskell-actions/hlint-scan@v1.0.0

  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2.0.0

      - name: Run Prettier
        run: npx --yes prettier --check .

  markdownlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2.0.0

      - uses: DavidAnson/markdownlint-cli2-action@v15.0.0
